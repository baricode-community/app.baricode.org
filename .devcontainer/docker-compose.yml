services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/workspace:cached
    command: sleep infinity
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=baricode_platform
      - DB_USERNAME=baricode
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REVERB_HOST=localhost
      - REVERB_PORT=8080
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - baricode-net

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: baricode_platform
      MYSQL_USER: baricode
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "baricode",
          "-psecret",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - baricode-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - baricode-net

volumes:
  mysql-data:
  redis-data:

networks:
  baricode-net:
    driver: bridge
